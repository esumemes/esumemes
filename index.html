<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream en Vivo - Kimowo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; background-color: #0e0e10; }
        body { display: flex; height: 100vh; overflow: hidden; font-family: sans-serif; color: white; }
        
        /* Contenedor del video (Izquierda) */
        .contenedor-video { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        iframe { border: none; width: 100%; height: 100%; }
        
        /* Botón flotante para abrir/cerrar la barra de chats por completo */
        .btn-toggle-barra { position: absolute; top: 15px; right: 15px; z-index: 100; padding: 10px 15px; background-color: #232329; border: 1px solid #464649; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
        .btn-toggle-barra:hover { background-color: #313137; }

        /* Contenedor de la barra lateral (Derecha) */
        .barra-lateral { width: 350px; height: 100%; display: flex; flex-direction: column; border-left: 1px solid #2f2f35; transition: width 0.3s ease; }
        .barra-oculta { width: 0px; display: none; }
        
        /* Zona de suscripciones y selección de chat */
        .panel-control { background-color: #18181b; padding: 10px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #2f2f35; }
        
        /* Fila de botones de Suscripción */
        .fila-subs { display: flex; gap: 8px; justify-content: center; }
        .btn-sub { flex: 1; padding: 8px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; font-size: 13px; }
        .sub-twitch { background-color: #9146ff; color: white; }
        .sub-kick { background-color: #53fc18; color: black; }

        /* Fila de botones de pestañas de Chat */
        .fila-chats { display: flex; gap: 8px; justify-content: center; }
        .btn-chat { flex: 1; padding: 6px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: #adadb8; background-color: #26262c; }
        .btn-chat.activo-twitch { background-color: #9146ff; color: white; }
        .btn-chat.activo-kick { background-color: #53fc18; color: black; }
        
        /* Contenedor de los iFrames del chat */
        .contenedor-chats { flex: 1; position: relative; background-color: #0e0e10; }
        .chat-iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; border: none; }
        .chat-visible { display: block; }
    </style>
</head>
<body>

    <!-- REPRODUCTOR DE VIDEO (KICK) -->
    <div class="contenedor-video">
        <button class="btn-toggle-barra" onclick="toggleBarra()">💬 Ocultar/Mostrar Chat</button>
        
        <iframe 
            src="https://player.kick.com/kimowo" 
            allowfullscreen="true">
        </iframe>
    </div>

    <!-- BARRA LATERAL (CHATS Y SUBS) -->
    <div class="barra-lateral" id="barraLateral">
        <div class="panel-control">
            <!-- Botones de Suscripción -->
            <div class="fila-subs">
                <a href="https://www.twitch.tv/subs/esumemes" target="_blank" class="btn-sub sub-twitch">⭐ Sub Twitch</a>
                <a href="https://kick.com/kimowo/subscribe" target="_blank" class="btn-sub sub-kick">💚 Sub Kick</a>
            </div>
            
            <!-- Botones para alternar entre chats -->
            <div class="fila-chats">
                <button id="btnTabTwitch" class="btn-chat activo-twitch" onclick="cambiarChat('twitch')">Twitch Chat</button>
                <button id="btnTabKick" class="btn-chat" onclick="cambiarChat('kick')">Kick Chat</button>
            </div>
        </div>
        
        <!-- Área de los Chats -->
        <div class="contenedor-chats">
            <!-- Chat de Twitch con doble refuerzo oscuro (theme=dark y darkpopout) -->
<iframe id="chatTwitch" class="chat-iframe chat-visible"
                src="https://www.twitch.tv/popout/esumemes/chat?darkpopout"
                height="100%" width="100%">
            </iframe>
            
            <!-- Chat de Kick -->
            <iframe id="chatKick" class="chat-iframe"
                src="https://kick.com/popout/kimowo/chat"
                height="100%" width="100%">
            </iframe>
        </div>
    </div>

    <script>
        function cambiarChat(plataforma) {
            const chatTwitch = document.getElementById('chatTwitch');
            const chatKick = document.getElementById('chatKick');
            const btnTwitch = document.getElementById('btnTabTwitch');
            const btnKick = document.getElementById('btnTabKick');

            if(plataforma === 'twitch') {
                chatTwitch.classList.add('chat-visible');
                chatKick.classList.remove('chat-visible');
                btnTwitch.classList.add('activo-twitch');
                btnKick.classList.remove('activo-kick');
            } else if(plataforma === 'kick') {
                chatKick.classList.add('chat-visible');
                chatTwitch.classList.remove('chat-visible');
                btnKick.classList.add('activo-kick');
                btnTwitch.classList.remove('activo-twitch');
            }
        }

        function toggleBarra() {
            const barra = document.getElementById('barraLateral');
            barra.classList.toggle('barra-oculta');
        }
    </script>

</body>
</html>
